<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - The Blue Room Coboconk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <section class="container my-5">
        <h1 class="text-center">Contact Us</h1>
        <p class="text-center lead">Reach out to The Blue Room Coboconk for bookings, questions, or donations!</p>
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                <p>Get in touch via email:</p>
                <div class="d-flex flex-column flex-md-row justify-content-center gap-3 mb-4">
                    <a href="mailto:bookings@theblueroomcoboconk.com" class="btn btn-primary"><i class="bi bi-calendar-event me-2"></i> Bookings</a>
                    <a href="mailto:questions@theblueroomcoboconk.com" class="btn btn-primary"><i class="bi bi-question-circle me-2"></i> Questions</a>
                    <a href="mailto:donations@theblueroomcoboconk.com" class="btn btn-primary"><i class="bi bi-heart-fill me-2"></i> Donations</a>
                </div>
                <p>Location: 6666 Hwy 35, Coboconk, ON</p>
                <p class="text-muted">We’ll get back to you as soon as possible!</p>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/load-nav.js"></script>
    <script src="js/load-footer.js"></script>
</body>
</html>
