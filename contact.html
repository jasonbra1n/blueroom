<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - The Blue Room Coboconk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="navbar-placeholder"></div>

    <section class="container my-5">
        <h1 class="text-center">Contact Us</h1>
        <p class="text-center">Booking inquiries or questions? Reach out!</p>
        <p class="text-center">Call to RSVP: 613-553-4699<br>Location: 6666 Hwy 35, Coboconk, ON</p>
        <form class="col-md-6 mx-auto">
            <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control" id="name" disabled placeholder="Form coming soon">
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" disabled placeholder="Form coming soon">
            </div>
            <div class="mb-3">
                <label for="message" class="form-label">Message</label>
                <textarea class="form-control" id="message" rows="3" disabled placeholder="Form coming soon"></textarea>
            </div>
        </form>
    </section>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/load-nav.js"></script>
    <script src="js/load-footer.js"></script>
</body>
</html>
